<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        fill: #1f2937;
      }
      .title {
        font-size: 22px;
        font-weight: 700;
      }
      .center-title {
        font-size: 24px;
        font-weight: 700;
      }
      .sub {
        font-size: 14px;
        fill: #475569;
      }
      .bullet {
        font-size: 14px;
        fill: #334155;
      }
      .dot {
        font-size: 19px;
        font-weight: 700;
      }
      .card {
        stroke-width: 1.4;
      }
      .line {
        fill: none;
        stroke: #334155;
        stroke-width: 1.5;
        stroke-linejoin: miter;
        stroke-linecap: square;
        marker-end: url(#arrow);
      }
      .thin {
        fill: none;
        stroke: #64748b;
        stroke-width: 1.2;
        stroke-linejoin: miter;
        stroke-linecap: square;
        marker-end: url(#arrow);
      }
      .branch {
        fill: none;
        stroke: #64748b;
        stroke-width: 1.2;
        stroke-linejoin: miter;
        stroke-linecap: square;
      }
      .center { fill: #f8fafc; stroke: #334155; }
      .baseline { fill: #e6f5ef; stroke: #0b6e4f; }
      .ltr { fill: #f3e8ff; stroke: #7c3aed; }
      .semantic { fill: #ffe4e6; stroke: #e11d48; }
      .hybrid { fill: #fef3c7; stroke: #d97706; }
      .router { fill: #dbeafe; stroke: #2563eb; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="none"/>

  <!-- Center framework -->
  <rect x="390" y="230" width="420" height="116" rx="18" class="center card"/>
  <text x="600" y="270" text-anchor="middle" class="center-title">Multi-Stage Ranking Framework</text>
  <text x="600" y="303" text-anchor="middle" class="sub">Initial scoring → feature reranking →</text>
  <text x="600" y="325" text-anchor="middle" class="sub">semantic refinement → final fusion</text>

  <!-- Top-left -->
  <rect x="70" y="70" width="350" height="150" rx="18" class="baseline card"/>
  <text x="105" y="110" class="title">Baseline Retrieval</text>
  <text x="105" y="152" class="dot" fill="#0b6e4f">•</text>
  <text x="132" y="152" class="bullet">Lexical relevance scoring</text>
  <text x="105" y="188" class="dot" fill="#0b6e4f">•</text>
  <text x="132" y="188" class="bullet">Efficient initial ranking</text>

  <!-- Bottom-left -->
  <rect x="70" y="370" width="350" height="170" rx="18" class="ltr card"/>
  <text x="105" y="410" class="title">LTR Reranking</text>
  <text x="105" y="452" class="dot" fill="#7c3aed">•</text>
  <text x="132" y="452" class="bullet">LambdaMART with handcrafted features</text>
  <text x="105" y="488" class="dot" fill="#7c3aed">•</text>
  <text x="132" y="488" class="bullet">BM25, exact match, position,</text>
  <text x="132" y="512" class="bullet">semantic similarity</text>

  <!-- Top-right -->
  <rect x="780" y="70" width="350" height="150" rx="18" class="semantic card"/>
  <text x="815" y="110" class="title">Semantic Reranking</text>
  <text x="815" y="152" class="dot" fill="#e11d48">•</text>
  <text x="842" y="152" class="bullet">Cross-Encoder relevance estimation</text>
  <text x="815" y="188" class="dot" fill="#e11d48">•</text>
  <text x="842" y="188" class="bullet">Improves difficult-query ranking quality</text>

  <!-- Bottom-right -->
  <rect x="780" y="370" width="350" height="170" rx="18" class="hybrid card"/>
  <text x="815" y="410" class="title">Hybrid Fusion</text>
  <text x="815" y="452" class="dot" fill="#d97706">•</text>
  <text x="842" y="452" class="bullet">Combines lexical and semantic signals</text>
  <text x="815" y="488" class="dot" fill="#d97706">•</text>
  <text x="842" y="488" class="bullet">Improves ranking robustness</text>

  <!-- Bottom router -->
  <rect x="390" y="575" width="420" height="110" rx="18" class="router card"/>
  <text x="425" y="608" class="title">Adaptive Router</text>
  <text x="425" y="644" class="dot" fill="#2563eb">•</text>
  <text x="452" y="644" class="bullet">Selects ranking path by query difficulty</text>
  <text x="425" y="674" class="dot" fill="#2563eb">•</text>
  <text x="452" y="674" class="bullet">Balances quality and efficiency</text>

  <!-- Side bracket relations: modules merge first, then point to the framework -->
  <path d="M245 220 L245 370" class="branch"/>
  <path d="M245 288 L390 288" class="thin"/>
  <path d="M955 220 L955 370" class="branch"/>
  <path d="M955 288 L810 288" class="thin"/>
  <path d="M600 575 L600 346" class="line"/>
</svg>
