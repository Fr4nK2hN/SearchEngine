<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        fill: #1f2937;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
      }
      .layer {
        font-size: 16px;
        font-weight: 700;
        fill: #475569;
      }
      .box-title {
        font-size: 15px;
        font-weight: 700;
      }
      .box-sub {
        font-size: 13px;
        fill: #475569;
      }
      .label {
        font-size: 12px;
        fill: #475569;
      }
      .line {
        fill: none;
        stroke: #334155;
        stroke-width: 1.5;
        marker-end: url(#arrow);
      }
      .dash {
        fill: none;
        stroke: #64748b;
        stroke-width: 1.4;
        stroke-dasharray: 6 5;
        marker-end: url(#arrow);
      }
      .group {
        fill: #f8fafc;
        stroke: #cbd5e1;
        stroke-width: 1.2;
      }
      .user { fill: #ffffff; stroke: #334155; }
      .frontend { fill: #e6f5ef; stroke: #0b6e4f; }
      .backend { fill: #dbeafe; stroke: #2563eb; }
      .core { fill: #fef3c7; stroke: #d97706; }
      .data { fill: #f3e8ff; stroke: #7c3aed; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="none"/>
  <!-- User Layer -->
  <text x="70" y="90" class="layer">User Layer</text>
  <rect x="520" y="70" width="160" height="48" rx="10" class="user"/>
  <text x="600" y="99" text-anchor="middle" class="box-title">User</text>

  <!-- Presentation Layer -->
  <rect x="55" y="145" width="1090" height="86" rx="16" class="group"/>
  <text x="75" y="171" class="layer">Presentation Layer</text>
  <rect x="460" y="160" width="280" height="56" rx="10" class="frontend"/>
  <text x="600" y="184" text-anchor="middle" class="box-title">Web Frontend</text>
  <text x="600" y="203" text-anchor="middle" class="box-sub">Search UI &amp; Result View</text>

  <!-- Application Layer -->
  <rect x="55" y="255" width="1090" height="96" rx="16" class="group"/>
  <text x="75" y="282" class="layer">Application Layer</text>
  <rect x="440" y="272" width="320" height="62" rx="10" class="backend"/>
  <text x="600" y="297" text-anchor="middle" class="box-title">Flask Backend Services</text>
  <text x="600" y="317" text-anchor="middle" class="box-sub">API / Request Handling / Logging</text>

  <!-- Search Core Layer -->
  <rect x="55" y="375" width="1090" height="150" rx="16" class="group"/>
  <text x="75" y="402" class="layer">Search Core Layer</text>

  <rect x="140" y="430" width="220" height="62" rx="10" class="core"/>
  <text x="250" y="455" text-anchor="middle" class="box-title">Query Processing</text>
  <text x="250" y="475" text-anchor="middle" class="box-sub">Mode &amp; Parameters</text>

  <rect x="390" y="430" width="220" height="62" rx="10" class="core"/>
  <text x="500" y="455" text-anchor="middle" class="box-title">Retrieval Module</text>
  <text x="500" y="475" text-anchor="middle" class="box-sub">Strict / Relaxed Recall</text>

  <rect x="640" y="430" width="220" height="62" rx="10" class="core"/>
  <text x="750" y="455" text-anchor="middle" class="box-title">Ranking Module</text>
  <text x="750" y="475" text-anchor="middle" class="box-sub">Baseline / LTR / Semantic / Adaptive</text>

  <rect x="890" y="430" width="220" height="62" rx="10" class="core"/>
  <text x="1000" y="455" text-anchor="middle" class="box-title">Index Management</text>
  <text x="1000" y="475" text-anchor="middle" class="box-sub">Mapping &amp; Bulk Indexing</text>

  <!-- Data Layer -->
  <rect x="55" y="555" width="1090" height="110" rx="16" class="group"/>
  <text x="75" y="582" class="layer">Data Layer</text>

  <rect x="140" y="590" width="220" height="56" rx="10" class="data"/>
  <text x="250" y="614" text-anchor="middle" class="box-title">Event Logs &amp; Reports</text>
  <text x="250" y="633" text-anchor="middle" class="box-sub">Feedback / Performance / Survey</text>

  <rect x="470" y="590" width="260" height="56" rx="10" class="data"/>
  <text x="600" y="614" text-anchor="middle" class="box-title">Elasticsearch Index</text>
  <text x="600" y="633" text-anchor="middle" class="box-sub">Documents &amp; Inverted Index</text>

  <rect x="890" y="590" width="220" height="56" rx="10" class="data"/>
  <text x="1000" y="614" text-anchor="middle" class="box-title">MS MARCO Dataset</text>
  <text x="1000" y="633" text-anchor="middle" class="box-sub">Processed Documents</text>

  <!-- Main vertical flow -->
  <line x1="600" y1="118" x2="600" y2="160" class="line"/>
  <line x1="600" y1="216" x2="600" y2="272" class="line"/>
  <line x1="600" y1="334" x2="600" y2="375" class="line"/>

  <!-- Search core internal flow -->
  <line x1="360" y1="461" x2="390" y2="461" class="line"/>
  <line x1="610" y1="461" x2="640" y2="461" class="line"/>

  <!-- Data dependencies -->
  <polyline points="500,492 500,540 600,540 600,590" class="line"/>
  <polyline points="1000,590 1000,492" class="line"/>
  <polyline points="890,461 860,461" class="line"/>
  <polyline points="890,618 840,618 840,525 1000,525 1000,492" class="line"/>

  <!-- Logging path, routed outside the main flow to avoid crossings -->
  <polyline points="440,303 95,303 95,618 140,618" class="dash"/>

  <!-- Small flow labels -->
  <text x="615" y="247" class="label">HTTP Request</text>
  <text x="615" y="364" class="label">Search Execution</text>
  <text x="370" y="448" class="label">Recall</text>
  <text x="620" y="448" class="label">Rerank</text>
  <text x="510" y="532" class="label">Query Index</text>
  <text x="1008" y="546" class="label">Build Index</text>
  <text x="108" y="322" class="label">Logs</text>
</svg>
