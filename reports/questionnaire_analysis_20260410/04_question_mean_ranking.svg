<rect x="0" y="0" width="1400" height="830" fill="#fffdfa"/><text x="60" y="50" class="title">题项均分排名</text><text x="60" y="80" class="subtitle">用于识别系统优势项与短板项</text><text x="60" y="138" class="small">我能够较快学会如何使用该系统进行检索</text><rect x="650" y="120" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="120" width="572.9" height="20" rx="8" fill="#0b6e4f"/><text x="1360" y="136" text-anchor="end" class="small">4.09 / 5</text><text x="60" y="172" class="small">我认为这种“根据查询动态调整排序方式”的设计是有价值的</text><rect x="650" y="154" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="154" width="566.5" height="20" rx="8" fill="#0b6e4f"/><text x="1360" y="170" text-anchor="end" class="small">4.05 / 5</text><text x="60" y="206" class="small">我认为系统的响应时间在可接受范围内</text><rect x="650" y="188" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="188" width="557.8" height="20" rx="8" fill="#0b6e4f"/><text x="1360" y="204" text-anchor="end" class="small">3.98 / 5</text><text x="60" y="240" class="small">我认为该系统的使用方式容易理解</text><rect x="650" y="222" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="222" width="555.7" height="20" rx="8" fill="#0b6e4f"/><text x="1360" y="238" text-anchor="end" class="small">3.97 / 5</text><text x="60" y="274" class="small">我认为系统能够根据不同查询给出较合适的结果排序</text><rect x="650" y="256" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="256" width="542.8" height="20" rx="8" fill="#0b6e4f"/><text x="1360" y="272" text-anchor="end" class="small">3.88 / 5</text><text x="60" y="308" class="small">我认为系统界面布局清晰、操作方便</text><rect x="650" y="290" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="290" width="534.2" height="20" rx="8" fill="#4b5563"/><text x="1360" y="306" text-anchor="end" class="small">3.82 / 5</text><text x="60" y="342" class="small">我认为系统能够较好地理解我的查询意图</text><rect x="650" y="324" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="324" width="529.8" height="20" rx="8" fill="#4b5563"/><text x="1360" y="340" text-anchor="end" class="small">3.78 / 5</text><text x="60" y="376" class="small">如果需要，我愿意继续使用该系统进行信息检索</text><rect x="650" y="358" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="358" width="514.8" height="20" rx="8" fill="#4b5563"/><text x="1360" y="374" text-anchor="end" class="small">3.68 / 5</text><text x="60" y="410" class="small">系统的响应速度不会明显影响我的使用体验</text><rect x="650" y="392" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="392" width="508.3" height="20" rx="8" fill="#4b5563"/><text x="1360" y="408" text-anchor="end" class="small">3.63 / 5</text><text x="60" y="444" class="small">我在使用该系统时不容易感到困惑</text><rect x="650" y="426" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="426" width="504.0" height="20" rx="8" fill="#4b5563"/><text x="1360" y="442" text-anchor="end" class="small">3.60 / 5</text><text x="60" y="478" class="small">与一般搜索体验相比，我认为该系统的结果排序表现较好</text><rect x="650" y="460" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="460" width="504.0" height="20" rx="8" fill="#4b5563"/><text x="1360" y="476" text-anchor="end" class="small">3.60 / 5</text><text x="60" y="512" class="small">我认为系统返回搜索结果的速度较快</text><rect x="650" y="494" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="494" width="501.8" height="20" rx="8" fill="#4b5563"/><text x="1360" y="510" text-anchor="end" class="small">3.58 / 5</text><text x="60" y="546" class="small">我愿意向他人推荐该系统</text><rect x="650" y="528" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="528" width="501.8" height="20" rx="8" fill="#4b5563"/><text x="1360" y="544" text-anchor="end" class="small">3.58 / 5</text><text x="60" y="580" class="small">搜索结果页面的信息展示清晰明了</text><rect x="650" y="562" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="562" width="497.5" height="20" rx="8" fill="#4b5563"/><text x="1360" y="578" text-anchor="end" class="small">3.55 / 5</text><text x="60" y="614" class="small">搜索结果中较靠前的位置通常能够出现我需要的信息</text><rect x="650" y="596" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="596" width="495.4" height="20" rx="8" fill="#4b5563"/><text x="1360" y="612" text-anchor="end" class="small">3.54 / 5</text><text x="60" y="648" class="small">我能够较容易区分不同结果之间的内容差异</text><rect x="650" y="630" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="630" width="493.2" height="20" rx="8" fill="#d97706"/><text x="1360" y="646" text-anchor="end" class="small">3.52 / 5</text><text x="60" y="682" class="small">搜索结果的标题、摘要等信息对我判断结果是否有用很有帮助</text><rect x="650" y="664" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="664" width="488.9" height="20" rx="8" fill="#d97706"/><text x="1360" y="680" text-anchor="end" class="small">3.49 / 5</text><text x="60" y="716" class="small">该系统返回的结果与我的查询需求较为相关</text><rect x="650" y="698" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="698" width="482.5" height="20" rx="8" fill="#d97706"/><text x="1360" y="714" text-anchor="end" class="small">3.45 / 5</text><text x="60" y="750" class="small">我认为系统在保证结果质量的同时，也兼顾了响应效率</text><rect x="650" y="732" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="732" width="482.5" height="20" rx="8" fill="#d97706"/><text x="1360" y="748" text-anchor="end" class="small">3.45 / 5</text><text x="60" y="784" class="small">总体而言，我对该搜索引擎系统的表现感到满意</text><rect x="650" y="766" width="700" height="20" rx="8" fill="#eef2f7"/><rect x="650" y="766" width="480.3" height="20" rx="8" fill="#d97706"/><text x="1360" y="782" text-anchor="end" class="small">3.43 / 5</text>
</svg>