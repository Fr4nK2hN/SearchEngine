<rect x="0" y="0" width="1200" height="740" fill="#fffdfa"/><text x="60" y="60" class="title">各维度正中负反馈分布</text><text x="60" y="92" class="subtitle">正向=同意+非常同意，中性=一般，负向=不同意+非常不同意</text><text x="60" y="172" class="label">易用性</text><rect x="240" y="150" width="148.8" height="30" rx="6" fill="#9f2a1b"/><rect x="388.8" y="150" width="110.8" height="30" rx="0" fill="#d97706"/><rect x="499.6" y="150" width="640.4" height="30" rx="6" fill="#0b6e4f"/><text x="1160" y="172" text-anchor="end" class="small">正向 71.2% | 中性 12.3% | 负向 16.5%</text><text x="60" y="257" class="label">相关性与排序</text><rect x="240" y="235" width="190.4" height="30" rx="6" fill="#9f2a1b"/><rect x="430.4" y="235" width="138.5" height="30" rx="0" fill="#d97706"/><rect x="568.8" y="235" width="571.2" height="30" rx="6" fill="#0b6e4f"/><text x="1160" y="257" text-anchor="end" class="small">正向 63.5% | 中性 15.4% | 负向 21.2%</text><text x="60" y="342" class="label">性能体验</text><rect x="240" y="320" width="166.2" height="30" rx="6" fill="#9f2a1b"/><rect x="406.2" y="320" width="147.7" height="30" rx="0" fill="#d97706"/><rect x="553.8" y="320" width="586.2" height="30" rx="6" fill="#0b6e4f"/><text x="1160" y="342" text-anchor="end" class="small">正向 65.1% | 中性 16.4% | 负向 18.5%</text><text x="60" y="427" class="label">结果展示</text><rect x="240" y="405" width="240.0" height="30" rx="6" fill="#9f2a1b"/><rect x="480.0" y="405" width="138.5" height="30" rx="0" fill="#d97706"/><rect x="618.5" y="405" width="521.5" height="30" rx="6" fill="#0b6e4f"/><text x="1160" y="427" text-anchor="end" class="small">正向 57.9% | 中性 15.4% | 负向 26.7%</text><text x="60" y="512" class="label">总体满意度</text><rect x="240" y="490" width="189.2" height="30" rx="6" fill="#9f2a1b"/><rect x="429.2" y="490" width="175.4" height="30" rx="0" fill="#d97706"/><rect x="604.6" y="490" width="535.4" height="30" rx="6" fill="#0b6e4f"/><text x="1160" y="512" text-anchor="end" class="small">正向 59.5% | 中性 19.5% | 负向 21.0%</text><text x="60" y="597" class="label">自适应策