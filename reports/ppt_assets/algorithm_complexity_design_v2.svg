<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
<defs>
<filter id="shadow" x="-12%" y="-12%" width="124%" height="132%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#243047" flood-opacity="0.10"/></filter>
</defs>
<rect x="70" y="54" width="690" height="565" rx="24" fill="#F8FBFF" stroke="#D5DFEC" stroke-width="2" filter="url(#shadow)"/>
<rect x="800" y="54" width="410" height="565" rx="24" fill="#F8FBFF" stroke="#D5DFEC" stroke-width="2" filter="url(#shadow)"/>
<text x="104" y="104" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#243047">Algorithmic Cost Comparison</text>
<rect x="104" y="132" width="610" height="40" rx="10" fill="#EAF1F8"/>
<text x="122" y="159" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#243047">Method</text>
<text x="287" y="159" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#243047">Ranking Cost</text>
<text x="582" y="159" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#243047">Role</text>
<rect x="104" y="190" width="610" height="66" rx="16" fill="#EEF5FF" stroke="#D5DFEC" stroke-width="1"/>
<rect x="118" y="206" width="8" height="34" rx="4" fill="#7EA6D8"/>
<text x="138" y="230" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">Baseline</text>
<text x="287" y="230" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">O(1) after ES</text>
<text x="582" y="230" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#667085">Fast path</text>
<rect x="104" y="274" width="610" height="66" rx="16" fill="#FFF6DC" stroke="#D5DFEC" stroke-width="1"/>
<rect x="118" y="290" width="8" height="34" rx="4" fill="#F2B84B"/>
<text x="138" y="314" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">LTR</text>
<text x="287" y="314" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">O(kF + k log k)</text>
<text x="582" y="314" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#667085">Feature rank</text>
<rect x="104" y="358" width="610" height="66" rx="16" fill="#FDEDEA" stroke="#D5DFEC" stroke-width="1"/>
<rect x="118" y="374" width="8" height="34" rx="4" fill="#E86E5A"/>
<text x="138" y="398" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">Cross-Encoder</text>
<text x="287" y="398" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">O(k · L² · H)</text>
<text x="582" y="398" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#667085">Semantic rank</text>
<rect x="104" y="442" width="610" height="66" rx="16" fill="#EAF7F0" stroke="#D5DFEC" stroke-width="1"/>
<rect x="118" y="458" width="8" height="34" rx="4" fill="#2F9E62"/>
<text x="138" y="482" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">Adaptive</text>
<text x="287" y="482" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#243047">O(r) + p·O(kF + k log k)</text>
<text x="582" y="482" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#667085">Gated rank</text>
<rect x="104" y="542" width="610" height="50" rx="14" fill="#FFFFFF" stroke="#D5DFEC" stroke-width="1"/>
<text x="124" y="563" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="14" fill="#667085">k: reranked candidates   F: features   L: sequence length</text>
<text x="124" y="582" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="14" fill="#667085">H: Transformer computation   p: hard-query ratio   r: router cost</text>
<text x="834" y="104" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#243047">Adaptive Routing Rule</text>
<rect x="834" y="134" width="342" height="126" rx="18" fill="#EAF7F0" stroke="#A8DDBF" stroke-width="2"/>
<text x="858" y="179" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#2F9E62">I_hard(q) = 1</text>
<text x="858" y="215" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#243047">when P_hard(q) ≥ 0.60</text>
<text x="858" y="242" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="17" fill="#667085">otherwise use Baseline path</text>
<rect x="834" y="294" width="342" height="166" rx="18" fill="#FFFFFF" stroke="#D5DFEC" stroke-width="1.5"/>
<text x="858" y="335" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#243047">T_adaptive(q)</text>
<text x="858" y="371" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#243047">= T_ES(q) + T_router(q)</text>
<text x="858" y="406" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#243047">+ I_hard(q)</text>
<text x="858" y="438" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="19" font-weight="600" fill="#243047">· O(kF + k log k)</text>
<rect x="834" y="494" width="342" height="78" rx="18" fill="#F7FAFC" stroke="#D5DFEC" stroke-width="1"/>
<text x="858" y="527" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#243047">Measured route split</text>
<text x="858" y="556" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#2F9E62">16 LTR / 42 queries</text>
<rect x="70" y="642" width="1140" height="48" rx="18" fill="#F3F7FB" stroke="#D5DFEC" stroke-width="1"/>
<text x="100" y="672" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#243047">Key idea:</text>
<text x="205" y="672" font-family="Aptos, Calibri, Helvetica, Arial, sans-serif" font-size="20" fill="#243047">Apply LTR only to hard queries to balance ranking quality and response efficiency.</text>
</svg>