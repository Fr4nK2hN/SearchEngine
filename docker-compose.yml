version: '3.8'
services:
  elasticsearch:
    image: elasticsearch:8.14.1
    container_name: elasticsearch
    environment:
      - "discovery.type=single-node"
      - "xpack.security.enabled=false"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  init:
    build: .
    depends_on:
      - elasticsearch
    volumes:
      - .:/app
    command: python init.py

  app:
    build: .
    container_name: app
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - ADAPTIVE_EASY_MODE=${ADAPTIVE_EASY_MODE:-baseline}
      - ADAPTIVE_HARD_MODE=${ADAPTIVE_HARD_MODE:-hybrid}
      - ADAPTIVE_HARD_THRESHOLD=${ADAPTIVE_HARD_THRESHOLD:-}
      - RECALL_RELAX_THRESHOLD=${RECALL_RELAX_THRESHOLD:-5}
      - ADAPTIVE_HARD_TOP_K_CAP=${ADAPTIVE_HARD_TOP_K_CAP:-}
    volumes:
      - .:/app
    depends_on:
      - elasticsearch
      - init

volumes:
  es_data:
